<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AIG OSS License Analyzer</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/aig-bootstrap-override.css">
</head>
<body class="aig-background">

<div class="container aig-container" x-data="repoForm()" x-init="init()">

    <div class="aig-header text-center mb-5">
        <img src="/images/aig-logo.png" alt="AIG Logo" class="img-fluid mb-4" style="max-height: 120px;">
        <h2 class="aig-heading mt-4">AIG OSS License Analyzer</h2>
        <p class="text-muted">Analyze open-source licenses for supported project repositories</p>

        <!-- Navigation Buttons -->
        <div class="d-flex justify-content-center gap-2 mt-3 flex-wrap">
            <a href="/paac-results.html" class="btn btn-primary">PaaC Results</a>
            <a href="/compliance-run.html" class="btn btn-outline-primary">Compliance Tracker</a>
            <a href="/licenses.html" class="btn btn-outline-primary">SPDX Licenses</a>
            <a href="/shutdown.html" class="btn btn-outline-danger">Shutdown</a>
        </div>
    </div>
    <div class="aig-form shadow-sm p-4 bg-white rounded">
        <div class="mb-3">
            <label for="repoUrl" class="form-label fw-bold">GitHub Repository URL</label>
            <input type="url" class="form-control" id="repoUrl" placeholder="https://github.com/user/repo" x-model="repoUrl">
        </div>

        <div class="d-flex justify-content-end">
            <button class="btn btn-primary equal-width-btn" @click="submitRepo()">Analyze Repository</button>
        </div>

        <template x-if="loading">
            <div class="alert alert-info mt-3">Analyzing... Please wait.</div>
        </template>

        <template x-if="error">
            <div class="alert alert-danger mt-3" x-text="error"></div>
        </template>

        <template x-if="uuid">
            <div class="alert alert-success mt-3">
                <h5 class="mb-3">✅ PaaC Evaluation Complete</h5>
                <div class="row">
                    <div class="col-md-6">
                        <strong>Compliance UUID:</strong><br>
                        <code class="fs-6" x-text="uuid"></code>
                    </div>
                    <div class="col-md-3">
                        <strong>Overall Verdict:</strong><br>
                        <span class="badge fs-6"
                              :class="{
                                'bg-success': overallVerdict === 'COMPLIANT',
                                'bg-danger': overallVerdict === 'NON_COMPLIANT',
                                'bg-warning text-dark': overallVerdict === 'NEEDS_REVIEW'
                              }"
                              x-text="overallVerdict"></span>
                    </div>
                    <div class="col-md-3">
                        <strong>Dependencies:</strong><br>
                        <span x-text="totalDependencies"></span>
                    </div>
                </div>
                <div class="mt-2">
                    <small class="text-muted">Use this UUID to search for detailed compliance results in the
                        <a href="/paac-results.html">PaaC Results</a> page.
                    </small>
                </div>
            </div>
        </template>

        <template x-if="results.length">
            <div>
                <div class="d-flex justify-content-end mb-2">
                    <button class="btn btn-outline-primary btn-sm" @click="downloadCSV">
                        📥 Download CSV
                    </button>
                </div>
                <div class="table-responsive mt-5">
                    <h5 class="aig-heading mb-3">Detected Licenses</h5>
                    <table class="table table-bordered table-striped table-hover aig-table">
                        <thead>
                        <tr>
                            <th>Dependency</th>
                            <th>Version</th>
                            <th>License</th>
                            <th>License URL</th>
                        </tr>
                        </thead>
                        <tbody>
                        <template x-for="item in paginatedResults()" :key="item.name + '-' + item.license">
                            <tr>
                                <td x-text="item.name"></td>
                                <td x-text="item.version"></td>
                                <td x-text="item.license"></td>
                                <td x-html="formatSpdxExpression(item.spdxExpression)">
                                    <!--<a :href="item.licenseUrl" class="text-decoration-underline" target="_blank" x-text="item.licenseUrl"></a>-->
                                </td>
                            </tr>
                        </template>
                        </tbody>
                    </table>
                    <div class="d-flex justify-content-between align-items-center mt-3" x-show="results.length > 0">
                            <button class="btn btn-outline-primary"
                                    :disabled="currentPage === 1"
                                    @click="prevPage">
                                &laquo; Previous
                            </button>

                            <span>
                                Page <strong x-text="currentPage"></strong> of <strong x-text="totalPages"></strong>
                            </span>

                            <button class="btn btn-outline-primary"
                                    :disabled="currentPage === totalPages"
                                    @click="nextPage">
                                Next &raquo;
                            </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
        function repoForm() {
            return {
                repoUrl: '',
                results: [],
                loading: false,
                error: '',
                totalLicenses: 0,
                deprecatedLicenses: 0,

                // PaaC Evaluation Results
                uuid: '',
                overallVerdict: '',
                totalDependencies: 0,

                // Pagination
                currentPage: 1,
                perPage: 10,

                get totalPages() {
                    return Math.ceil(this.results.length / this.perPage);
                },

                paginatedResults() {
                    const start = (this.currentPage - 1) * this.perPage;
                    return this.results.slice(start, start + this.perPage);
                },

                nextPage() {
                    if (this.currentPage < this.totalPages) this.currentPage++;
                },

                prevPage() {
                    if (this.currentPage > 1) this.currentPage--;
                },

                async init() {
                    try {
                        const res = await fetch('/api/spdx/stats');
                        if (res.ok) {
                            const data = await res.json();
                            this.totalLicenses = data.totalLicenses;
                            this.deprecatedLicenses = data.deprecatedLicenses;
                        }
                    } catch (e) {
                        console.warn("Failed to fetch SPDX stats", e);
                    }
                },

                async submitRepo() {
                    this.error = '';
                    this.results = [];
                    this.uuid = '';
                    this.overallVerdict = '';
                    this.totalDependencies = 0;
                    this.loading = true;
                    this.currentPage = 1;

                    try {
                        const res = await fetch('/api/github/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ url: this.repoUrl })
                        });

                        if (!res.ok) throw new Error("Failed to analyze repository. Check URL or try again.");

                        const data = await res.json();
                        this.uuid = data.uuid;
                        this.overallVerdict = data.overallVerdict;
                        this.totalDependencies = data.totalDependencies;
                        this.results = data.dependencies;
                    } catch (err) {
                        this.error = err.message;
                    } finally {
                        this.loading = false;
                    }
                },

                formatSpdxExpression(expr) {
                    if (!expr) return '';
                    const parts = [];
                    const tokens = expr.split(/\s+/);

                    for (let i = 0; i < tokens.length; i++) {
                        const token = tokens[i];

                        if (token === 'AND' || token === 'OR') {
                            parts.push(` <strong>${token}</strong> `);
                        } else if (token === 'WITH') {
                            const last = parts.pop();
                            const next = tokens[++i];
                            const link = this.toSpdxLink(next);
                            parts.push(`${last} WITH ${link}`);
                        } else {
                            parts.push(this.toSpdxLink(token));
                        }
                    }

                    return parts.join('');
                },

                toSpdxLink(id) {
                    const safeId = id.replace(/[^a-zA-Z0-9.\-]/g, '');
                    return `<a href="https://spdx.org/licenses/${safeId}.html" target="_blank" class="text-blue-600 underline">${id}</a>`;
                },

                toSpdxUrl(id) {
                    const safeId = id.replace(/[^a-zA-Z0-9.\-]/g, '');
                    return `https://spdx.org/licenses/${safeId}.html`;
                },

                formatSpdxTextLinks(expr) {
                    if (!expr) return '';
                    const parts = [];
                    const tokens = expr.split(/\s+/);

                    for (let i = 0; i < tokens.length; i++) {
                        const token = tokens[i];

                        if (token === 'AND' || token === 'OR') {
                            parts.push(` ${token} `);
                        } else if (token === 'WITH') {
                            const last = parts.pop();
                            const next = tokens[++i];
                            const link = this.toSpdxUrl(next);
                            parts.push(`${last} WITH ${link}`);
                        } else {
                            parts.push(this.toSpdxUrl(token));
                        }
                    }

                    return parts.join('');
                },

                downloadCSV() {
                    if (!this.results.length) return;

                    const header = ['Dependency', 'Version', 'License', 'SPDX License URL(s)'];
                    const rows = this.results.map(item => [
                        `"${item.name}"`,
                        `"${item.version}"`,
                        `"${item.license}"`,
                        `"${this.formatSpdxTextLinks(item.spdxExpression)}"`
                    ]);

                    const csvContent = [header, ...rows]
                        .map(row => row.join(','))
                        .join('\n');

                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.setAttribute('download', 'oss-license-analysis.csv');
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            };
        }
</script>

<footer class="mt-5 text-center text-muted" x-data="{ licenses: 0, deprecated: 0 }" x-init="
    fetch('/api/spdx/stats')
        .then(res => res.json())
        .then(data => {
            licenses = data.totalLicenses;
            deprecated = data.deprecatedLicenses;
        });
">
    <small>
        SPDX Registry contains <strong x-text="licenses"></strong> licenses,
        including <strong x-text="deprecated"></strong> deprecated licenses.
    </small>
</footer>


</body>
</html>
`
<!--Minimalistic Template-->
