<!DOCTYPE html>
<html lang="en" x-data="shutdownApp()">
<head>
    <meta charset="UTF-8">
    <title>AIG Graceful Shutdown</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/aig-bootstrap-override.css">
</head>
<body class="aig-background">

<div class="container mt-5">
    <div class="text-center mb-5">
        <img src="/images/aig-logo.png" alt="AIG Logo" class="img-fluid mb-4" style="max-height: 120px;">
        <h2 class="aig-heading mb-3">AIG OSS License Analyzer</h2>
        <p class="text-muted mb-4">Use this control to gracefully shut down the application.</p>

        <!-- Navigation Buttons -->
        <div class="d-flex justify-content-center gap-2 mt-3 mb-4 flex-wrap">
            <a href="/index.html" class="btn btn-primary">Home</a>
            <a href="/paac-results.html" class="btn btn-outline-primary">PaaC Results</a>
            <a href="/compliance-run.html" class="btn btn-outline-primary">Compliance Tracker</a>
            <a href="/licenses.html" class="btn btn-outline-primary">SPDX Licenses</a>
        </div>
    </div>

    <div class="text-center">
        <div class="mb-3" style="max-width: 300px; margin: auto;">
            <label for="apiKey" class="form-label fw-bold">API Key</label>
            <input type="password" id="apiKey" class="form-control text-center" x-model="apiKey" placeholder="Enter shutdown key">
        </div>

        <button class="btn btn-outline-danger btn-lg fw-bold equal-width-btn" @click="shutdown()">
            Shutdown Application
        </button>

        <template x-if="message">
            <div class="alert alert-warning mt-4" x-text="message"></div>
        </template>
    </div>
</div>

<script>
    function shutdownApp() {
        return {
            apiKey: '',
            message: '',

            async shutdown() {
                if (!this.apiKey) {
                    this.message = 'API key is required to initiate shutdown.';
                    return;
                }

                this.message = 'Sending shutdown request...';

                try {
                    const res = await fetch('/api/shutdown', {
                        method: 'POST',
                        headers: {
                            'X-AIG-SHUTDOWN-KEY': this.apiKey
                        }
                    });

                    if (res.ok) {
                        this.message = 'Shutdown initiated successfully. The app will exit shortly.';
                    } else {
                        const text = await res.text();
                        this.message = 'Failed: ' + text;
                    }
                } catch (err) {
                    this.message = 'Error communicating with server.';
                }
            }
        }
    }
</script>

</body>
</html>
